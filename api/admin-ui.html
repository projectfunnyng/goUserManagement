<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>User Management Admin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    label { display: block; font-size: 12px; color: #6b7280; margin-bottom: 4px; }
    input, textarea, select { width: 100%; padding: 6px; border: 1px solid #d1d5db; border-radius: 6px; }
    button { padding: 8px 10px; border: none; border-radius: 6px; background: #2563eb; color: #fff; cursor: pointer; }
    button.secondary { background: #6b7280; }
    button.danger { background: #dc2626; }
    .list { border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px; background: #fafafa; max-height: 320px; overflow: auto; }
    .item { padding: 6px; border-bottom: 1px solid #e5e7eb; cursor: pointer; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .item:last-child { border-bottom: none; }
    .item.selected { background: #e5e7eb; }
    .muted { color: #6b7280; font-size: 12px; }
    .inline-actions { display: flex; gap: 6px; }
    [data-auth-section] { display: none; }
    .console { background: #111827; color: #e5e7eb; border-radius: 8px; padding: 10px; min-height: 160px; max-height: 280px; overflow: auto; font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
    .console-line { padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .console-line:last-child { border-bottom: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h2>Admin Sign In</h2>
      <div class="row">
        <div>
          <label>Client ID</label>
          <input id="clientId" />
        </div>
        <div>
          <label>Client Secret</label>
          <input id="clientSecret" type="password" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Email</label>
          <input id="email" />
        </div>
        <div>
          <label>Password</label>
          <input id="password" type="password" />
        </div>
        <div>
          <label>Scope</label>
          <input id="scope" value="superAdmin" />
        </div>
      </div>
      <div style="margin-top:8px; display:flex; gap:8px;">
        <button id="loginBtn">Sign In</button>
        <div class="muted" id="authStatus">Not signed in</div>
      </div>
      <div class="muted" id="loginError"></div>
    </div>

    <div class="card" id="sessionCard" data-auth-section style="display:none;">
      <div class="row" style="align-items:center;">
        <div class="muted" id="sessionStatus">Signed in</div>
        <div style="display:flex; justify-content:flex-end; gap:8px;">
          <button id="refreshBtn" class="secondary">Refresh</button>
          <button id="logoutBtn" class="secondary">Sign Out</button>
        </div>
      </div>
    </div>

    <div class="card" data-auth-section style="display:none;">
      <h3>Users</h3>
      <label>Search</label>
      <input id="userSearch" placeholder="email, name, status" />
      <div class="row" style="margin-top:8px;">
        <div>
          <label>Email</label>
          <input id="uEmail" />
        </div>
        <div>
          <label>First Name</label>
          <input id="uFirst" />
        </div>
        <div>
          <label>Last Name</label>
          <input id="uLast" />
        </div>
        <div>
          <label>Password</label>
          <input id="uPass" type="password" />
        </div>
        <div style="display:flex; align-items:flex-end; gap:8px;" id="uIsAdminWrap" data-super-only>
          <label style="margin:0;">
            <input id="uIsAdmin" type="checkbox" />
            <span style="margin-left:6px;">Admin User</span>
          </label>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Status</label>
          <select id="uStatus">
            <option value="invited">invited</option>
            <option value="active">active</option>
            <option value="suspended">suspended</option>
            <option value="locked">locked</option>
            <option value="deleted">deleted</option>
          </select>
        </div>
        <div>
          <label>Organization</label>
          <select id="uOrg"></select>
        </div>
        <div style="display:flex; align-items:flex-end; gap:6px;">
          <button id="createUserBtn">Create</button>
          <button id="updateUserBtn" class="secondary">Update</button>
          <button id="deleteUserBtn" class="danger">Delete</button>
        </div>
      </div>
      <div class="list" id="usersList"></div>
    </div>

    <div class="card" data-auth-section style="display:none;">
      <h3>Applications</h3>
      <label>Search</label>
      <input id="appSearch" placeholder="name, type" />
      <div class="row" style="margin-top:8px;">
        <div>
          <label>Name</label>
          <input id="aName" />
        </div>
        <div>
          <label>Type</label>
          <select id="aType">
            <option value="internal">internal</option>
            <option value="public">public</option>
            <option value="confidential">confidential</option>
          </select>
        </div>
        <div>
          <label>Enabled</label>
          <select id="aEnabled">
            <option value="true">true</option>
            <option value="false">false</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div>
          <label>Redirect URIs (comma)</label>
          <input id="aRedirects" />
        </div>
        <div>
          <label>Grants (comma)</label>
          <input id="aGrants" />
        </div>
        <div>
          <label>Scopes (comma)</label>
          <input id="aScopes" />
        </div>
      </div>
      <div class="row">
        <div>
          <label>Organization</label>
          <select id="aOrg"></select>
        </div>
        <div>
          <label>Client ID</label>
          <input id="aClientId" readonly />
        </div>
        <div>
          <label>Client Secret (once)</label>
          <input id="aClientSecret" readonly />
        </div>
      </div>
      <div class="row">
        <div style="display:flex; align-items:flex-end; gap:6px;">
          <button id="createAppBtn">Create</button>
          <button id="updateAppBtn" class="secondary">Update</button>
          <button id="deleteAppBtn" class="danger">Delete</button>
        </div>
      </div>
      <div class="list" id="appsList"></div>
    </div>

    <div class="card" id="orgsCard" data-auth-section data-super-only style="display:none;">
      <h3>Organizations (superAdmin only)</h3>
      <div class="row">
        <div>
          <label>Organization Name</label>
          <input id="orgName" />
        </div>
        <div style="display:flex; align-items:flex-end; gap:6px;">
          <button id="addOrgBtn">Add Org</button>
          <button id="updateOrgBtn" class="secondary">Update Org</button>
          <button id="deleteOrgBtn" class="danger">Delete Org</button>
        </div>
      </div>
      <div class="list" id="orgsList"></div>
    </div>

    <div class="card" id="consoleCard" data-auth-section data-super-only style="display:none;">
      <div class="row" style="align-items:center;">
        <h3 style="margin:0;">Console</h3>
        <div style="display:flex; align-items:flex-end; justify-content:flex-end;">
          <button id="clearConsoleBtn" class="secondary">Clear</button>
        </div>
      </div>
      <div class="console" id="consoleLog"></div>
    </div>
  </div>

  <script>
    const state = {
      token: "",
      scopes: [],
      isSuperAdmin: false,
      users: [],
      apps: [],
      orgs: [],
      selectedUserId: "",
      selectedAppId: "",
      selectedOrgId: "",
      userSearch: "",
      appSearch: "",
      consoleLines: []
    };

    function getToken() { return localStorage.getItem("admin_token") || ""; }
    function setToken(t) { if (!t) localStorage.removeItem("admin_token"); else localStorage.setItem("admin_token", t); }

    function decodeJwtPayload(token) {
      try {
        const base64 = token.split(".")[1];
        if (!base64) return null;
        const normalized = base64.replace(/-/g, "+").replace(/_/g, "/");
        return JSON.parse(atob(normalized));
      } catch {
        return null;
      }
    }

    function applyScopes(token) {
      const payload = decodeJwtPayload(token);
      const rawScope = payload && (payload.scope ?? payload.scp) ? (payload.scope ?? payload.scp) : "";
      const scopes = Array.isArray(rawScope)
        ? rawScope.map((s) => String(s).toLowerCase())
        : String(rawScope || "").split(/\s+/).map((s) => s.toLowerCase()).filter(Boolean);
      state.scopes = scopes;
      state.isSuperAdmin = scopes.includes("superadmin");
      setAuthVisible(true);
      syncOrgInputs();
    }

    function resetAdminState() {
      state.scopes = [];
      state.isSuperAdmin = false;
      state.users = [];
      state.apps = [];
      state.orgs = [];
      state.selectedUserId = "";
      state.selectedAppId = "";
      state.selectedOrgId = "";
      renderUsers();
      renderApps();
      renderOrgs();
      refreshUserForm();
      refreshAppForm();
      refreshOrgForm();
    }

    function setAuthVisible(isAuthed) {
      document.getElementById("loginCard").style.display = isAuthed ? "none" : "block";
      document.getElementById("sessionCard").style.display = isAuthed ? "block" : "none";
      document.querySelectorAll("[data-auth-section]").forEach(el => {
        if (!isAuthed) {
          el.style.display = "none";
          return;
        }
        const superOnly = el.hasAttribute("data-super-only");
        if (superOnly && !state.isSuperAdmin) {
          el.style.display = "none";
        } else {
          el.style.display = "block";
        }
      });
    }

    function syncOrgInputs() {
      const uOrg = document.getElementById("uOrg");
      const aOrg = document.getElementById("aOrg");
      const isSuper = state.isSuperAdmin;
      uOrg.disabled = !isSuper;
      aOrg.disabled = !isSuper;
      const orgs = availableOrgs();
      const orgOptions = orgs.map((org) => `<option value="${escapeAttr(org.id)}">${escapeHtml(org.name || org.id)}</option>`).join("");
      uOrg.innerHTML = orgOptions;
      aOrg.innerHTML = orgOptions;
      if (!isSuper) {
        ensureSelectedOrgOption(uOrg, state.selectedUserId ? (state.users.find((u) => u.id === state.selectedUserId) || {}).orgId : "");
        ensureSelectedOrgOption(aOrg, state.selectedAppId ? (state.apps.find((a) => a.id === state.selectedAppId) || {}).orgId : "");
      }
    }

    function availableOrgs() {
      const map = new Map();
      (state.orgs || []).forEach((org) => {
        if (org && org.id && !isHiddenOrg(org)) map.set(org.id, { id: org.id, name: org.name || org.id });
      });
      (state.users || []).forEach((user) => {
        if (user && user.orgId && !isHiddenOrg({ id: user.orgId, name: user.orgName })) {
          map.set(user.orgId, { id: user.orgId, name: user.orgName || user.orgId });
        }
      });
      (state.apps || []).forEach((app) => {
        if (app && app.orgId && !isHiddenOrg({ id: app.orgId, name: app.orgName })) {
          map.set(app.orgId, { id: app.orgId, name: app.orgName || app.orgId });
        }
      });
      return Array.from(map.values());
    }

    function isHiddenOrg(org) {
      const id = String((org && org.id) || "").trim().toLowerCase();
      if (id === "default") return true;
      return isHiddenOrgName(org && org.name);
    }

    function isHiddenOrgName(name) {
      const normalized = String(name || "").trim().toLowerCase();
      return normalized === "default" || normalized === "default org";
    }

    function ensureSelectedOrgOption(selectEl, orgId) {
      if (!orgId) {
        selectEl.value = "";
        return;
      }
      const exists = Array.from(selectEl.options).some((opt) => opt.value === orgId);
      if (!exists) {
        const extra = document.createElement("option");
        extra.value = orgId;
        extra.textContent = orgId;
        selectEl.appendChild(extra);
      }
      selectEl.value = orgId;
    }

    function logConsole(message, detail) {
      const time = new Date().toISOString();
      let line = `${time} ${message}`;
      if (detail !== undefined) {
        if (typeof detail === "string") {
          line += `\n${detail}`;
        } else {
          line += `\n${JSON.stringify(detail, null, 2)}`;
        }
      }
      state.consoleLines.unshift(line);
      state.consoleLines = state.consoleLines.slice(0, 100);
      renderConsole();
    }

    function renderConsole() {
      const el = document.getElementById("consoleLog");
      if (!el) return;
      el.innerHTML = state.consoleLines.length
        ? state.consoleLines.map((line) => `<div class="console-line">${escapeHtml(line)}</div>`).join("")
        : "<div class='muted'>No console entries</div>";
    }

    function clearConsole() {
      state.consoleLines = [];
      renderConsole();
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/"/g, "&quot;");
    }

    async function api(path, options) {
      const headers = { "Content-Type": "application/json" };
      const token = getToken();
      if (token) headers.Authorization = "Bearer " + token;
      const method = (options && options.method) || "GET";
      logConsole(`API ${method} ${path}`);
      const res = await fetch(path, { ...options, headers });
      const text = await res.text();
      let data = null;
      try { data = text ? JSON.parse(text) : null; } catch { data = text; }
      if (!res.ok) {
        logConsole(`API ${method} ${path} failed`, data || text || res.status);
        if (res.status === 401) {
          logout();
          throw new Error("Session expired or not authorized. Please sign in.");
        }
        throw new Error((data && data.message) || (data && data.error_description) || text || res.status);
      }
      logConsole(`API ${method} ${path} succeeded`);
      return data;
    }

    async function login() {
      document.getElementById("loginError").textContent = "";
      const body = {
        grant_type: "password",
        client_id: document.getElementById("clientId").value.trim(),
        client_secret: document.getElementById("clientSecret").value.trim(),
        username: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value,
        scope: document.getElementById("scope").value.trim()
      };
      try {
        const res = await fetch("/oauth/token", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error_description || data.message || "Login failed");
        const token = data.access_token || "";
        setToken(token);
        applyScopes(token);
        document.getElementById("authStatus").textContent = "Signed in";
        document.getElementById("sessionStatus").textContent = "Signed in";
        logConsole("Login succeeded", { scope: data.scope || "" });
        await refreshAll();
      } catch (e) {
        document.getElementById("loginError").textContent = String(e);
        logConsole("Login failed", String(e));
      }
    }

    function logout() {
      setToken("");
      resetAdminState();
      document.getElementById("authStatus").textContent = "Not signed in";
      document.getElementById("sessionStatus").textContent = "Not signed in";
      setAuthVisible(false);
      syncOrgInputs();
      logConsole("Logged out");
    }

    async function refreshAll() {
      const token = getToken();
      if (!token) {
        resetAdminState();
        setAuthVisible(false);
        syncOrgInputs();
        return;
      }
      setAuthVisible(true);
      const requests = [
        api("/admin/users"),
        api("/admin/apps"),
        state.isSuperAdmin ? api("/admin/orgs") : Promise.resolve([])
      ];
      const [usersResult, appsResult, orgsResult] = await Promise.allSettled(requests);

      if (usersResult.status === "fulfilled") {
        state.users = Array.isArray(usersResult.value) ? usersResult.value : [];
      } else {
        state.users = [];
        logConsole("Users refresh failed", String(usersResult.reason));
      }

      if (appsResult.status === "fulfilled") {
        state.apps = Array.isArray(appsResult.value) ? appsResult.value : [];
      } else {
        state.apps = [];
        logConsole("Apps refresh failed", String(appsResult.reason));
      }

      if (orgsResult.status === "fulfilled") {
        state.orgs = Array.isArray(orgsResult.value) ? orgsResult.value : [];
      } else {
        state.orgs = [];
        logConsole("Orgs refresh failed", String(orgsResult.reason));
      }

      reconcileSelections();
      syncOrgInputs();
      refreshUserForm();
      refreshAppForm();
      refreshOrgForm();
      renderUsers();
      renderApps();
      renderOrgs();
    }

    async function handleRefresh() {
      try {
        await refreshAll();
      } catch (error) {
        logConsole("Refresh failed", String(error));
        if (/unauthorized|invalid access token|session expired/i.test(String(error))) {
          logout();
        }
      }
    }

    function reconcileSelections() {
      if (state.selectedUserId && !state.users.some((u) => u.id === state.selectedUserId)) {
        state.selectedUserId = "";
      }
      if (state.selectedAppId && !state.apps.some((a) => a.id === state.selectedAppId)) {
        state.selectedAppId = "";
      }
      if (state.selectedOrgId && !state.orgs.some((o) => o.id === state.selectedOrgId)) {
        state.selectedOrgId = "";
      }
    }

    function refreshUserForm() {
      const selected = state.selectedUserId ? state.users.find((u) => u.id === state.selectedUserId) : null;
      if (!selected) {
        document.getElementById("uEmail").value = "";
        document.getElementById("uFirst").value = "";
        document.getElementById("uLast").value = "";
        document.getElementById("uPass").value = "";
        document.getElementById("uStatus").value = "invited";
        document.getElementById("uOrg").value = "";
        document.getElementById("uIsAdmin").checked = false;
        return;
      }
      document.getElementById("uEmail").value = selected.email || "";
      document.getElementById("uFirst").value = selected.firstName || "";
      document.getElementById("uLast").value = selected.lastName || "";
      document.getElementById("uStatus").value = selected.status || "invited";
      document.getElementById("uOrg").value = selected.orgId || "";
      document.getElementById("uIsAdmin").checked = Boolean(selected.isAdmin);
    }

    function refreshAppForm() {
      const selected = state.selectedAppId ? state.apps.find((a) => a.id === state.selectedAppId) : null;
      if (!selected) {
        document.getElementById("aName").value = "";
        document.getElementById("aType").value = "internal";
        document.getElementById("aEnabled").value = "true";
        document.getElementById("aOrg").value = "";
        return;
      }
      document.getElementById("aName").value = selected.name || "";
      document.getElementById("aType").value = selected.type || "internal";
      document.getElementById("aEnabled").value = String(Boolean(selected.enabled));
      document.getElementById("aOrg").value = selected.orgId || "";
    }

    function refreshOrgForm() {
      const selected = state.selectedOrgId ? state.orgs.find((o) => o.id === state.selectedOrgId) : null;
      document.getElementById("orgName").value = selected ? (selected.name || "") : "";
    }

    function renderUsers() {
      const list = document.getElementById("usersList");
      const q = state.userSearch.trim().toLowerCase();
      const rows = (state.users || []).filter(u => {
        if (!q) return true;
        return [u.email, u.status, u.firstName, u.lastName, u.orgName, u.isAdmin ? "admin" : "", u.isSuperAdmin ? "super admin" : ""].join(" ").toLowerCase().includes(q);
      });
      list.innerHTML = rows.map(u => {
        const selected = state.selectedUserId === u.id ? "selected" : "";
        const tags = [];
        if (u.isAdmin) tags.push("admin");
        if (u.isSuperAdmin) tags.push("super admin");
        const meta = [u.status, u.orgName].filter(Boolean).join(" | ");
        const badge = tags.length ? `<span class='muted'>${tags.join(", ")}</span>` : "<span class='muted'></span>";
        return `<div class='item ${selected}' data-id='${u.id}'>` +
          `<span>${u.email}<span class='muted'>${meta ? " (" + meta + ")" : ""}</span></span>` +
          `${badge}` +
          `</div>`;
      }).join("") || "<div class='item'>No users</div>";
      list.querySelectorAll("[data-id]").forEach(el => {
        el.addEventListener("click", () => selectUser(el.getAttribute("data-id")));
      });
    }

    function selectUser(id) {
      const u = state.users.find(x => x.id === id);
      if (!u) return;
      state.selectedUserId = id;
      syncOrgInputs();
      refreshUserForm();
      renderUsers();
    }

    async function createUser() {
      const payload = {
        email: document.getElementById("uEmail").value.trim(),
        firstName: document.getElementById("uFirst").value.trim() || undefined,
        lastName: document.getElementById("uLast").value.trim() || undefined,
        status: document.getElementById("uStatus").value,
        password: document.getElementById("uPass").value || undefined,
        orgId: document.getElementById("uOrg").value.trim() || undefined,
        isAdmin: document.getElementById("uIsAdmin").checked
      };
      await api("/admin/users", { method: "POST", body: JSON.stringify(payload) });
      await refreshAll();
    }

    async function updateUser() {
      if (!state.selectedUserId) return;
      const payload = {
        email: document.getElementById("uEmail").value.trim(),
        firstName: document.getElementById("uFirst").value.trim() || undefined,
        lastName: document.getElementById("uLast").value.trim() || undefined,
        status: document.getElementById("uStatus").value,
        password: document.getElementById("uPass").value || undefined,
        orgId: document.getElementById("uOrg").value.trim() || undefined,
        isAdmin: document.getElementById("uIsAdmin").checked
      };
      await api("/admin/users/" + state.selectedUserId, { method: "PUT", body: JSON.stringify(payload) });
      await refreshAll();
    }

    async function deleteUser() {
      if (!state.selectedUserId) return;
      await api("/admin/users/" + state.selectedUserId, { method: "DELETE" });
      state.selectedUserId = "";
      await refreshAll();
    }

    function renderApps() {
      const list = document.getElementById("appsList");
      const q = state.appSearch.trim().toLowerCase();
      const rows = (state.apps || []).filter(a => {
        if (!q) return true;
        return [a.name, a.type, a.orgName].join(" ").toLowerCase().includes(q);
      });
      list.innerHTML = rows.map(a => {
        const selected = state.selectedAppId === a.id ? "selected" : "";
        return `<div class='item ${selected}' data-id='${a.id}'><span>${a.name} <span class='muted'>(${a.type}${a.orgName ? " | " + a.orgName : ""})</span></span></div>`;
      }).join("") || "<div class='item'>No apps</div>";
      list.querySelectorAll("[data-id]").forEach(el => {
        el.addEventListener("click", () => selectApp(el.getAttribute("data-id")));
      });
    }

    function selectApp(id) {
      const a = state.apps.find(x => x.id === id);
      if (!a) return;
      state.selectedAppId = id;
      syncOrgInputs();
      refreshAppForm();
      renderApps();
    }

    async function createApp() {
      const payload = {
        name: document.getElementById("aName").value.trim(),
        type: document.getElementById("aType").value,
        enabled: document.getElementById("aEnabled").value === "true",
        redirectUris: document.getElementById("aRedirects").value.trim(),
        grants: document.getElementById("aGrants").value.trim(),
        scopes: document.getElementById("aScopes").value.trim(),
        orgId: document.getElementById("aOrg").value.trim() || undefined
      };
      const res = await api("/admin/apps", { method: "POST", body: JSON.stringify(payload) });
      document.getElementById("aClientId").value = res.client_id || "";
      document.getElementById("aClientSecret").value = res.client_secret || "";
      await refreshAll();
    }

    async function updateApp() {
      if (!state.selectedAppId) return;
      const payload = {
        name: document.getElementById("aName").value.trim(),
        type: document.getElementById("aType").value,
        enabled: document.getElementById("aEnabled").value === "true",
        orgId: document.getElementById("aOrg").value.trim() || undefined
      };
      await api("/admin/apps/" + state.selectedAppId, { method: "PUT", body: JSON.stringify(payload) });
      await refreshAll();
    }

    async function deleteApp() {
      if (!state.selectedAppId) return;
      await api("/admin/apps/" + state.selectedAppId, { method: "DELETE" });
      state.selectedAppId = "";
      await refreshAll();
    }

    function renderOrgs() {
      const list = document.getElementById("orgsList");
      list.innerHTML = (state.orgs || []).map(o => {
        const selected = state.selectedOrgId === o.id ? "selected" : "";
        return `<div class='item ${selected}' data-org-id='${o.id}'><span>${o.name}</span><span class='muted'>${o.id}</span></div>`;
      }).join("") || "<div class='item'>No orgs</div>";
      list.querySelectorAll("[data-org-id]").forEach(el => {
        el.addEventListener("click", () => selectOrg(el.getAttribute("data-org-id")));
      });
    }

    function selectOrg(id) {
      const o = state.orgs.find(x => x.id === id);
      if (!o) return;
      state.selectedOrgId = id;
      refreshOrgForm();
      renderOrgs();
    }

    async function addOrg() {
      const name = document.getElementById("orgName").value.trim();
      await api("/admin/orgs", { method: "POST", body: JSON.stringify({ name }) });
      await refreshAll();
    }

    async function updateOrg() {
      if (!state.selectedOrgId) return;
      const name = document.getElementById("orgName").value.trim();
      await api("/admin/orgs/" + state.selectedOrgId, { method: "PUT", body: JSON.stringify({ name }) });
      await refreshAll();
    }

    async function deleteOrg() {
      if (!state.selectedOrgId) return;
      await api("/admin/orgs/" + state.selectedOrgId, { method: "DELETE" });
      state.selectedOrgId = "";
      await refreshAll();
    }

    document.getElementById("loginBtn").addEventListener("click", login);
    document.getElementById("logoutBtn").addEventListener("click", logout);
    document.getElementById("refreshBtn").addEventListener("click", handleRefresh);
    document.getElementById("createUserBtn").addEventListener("click", createUser);
    document.getElementById("updateUserBtn").addEventListener("click", updateUser);
    document.getElementById("deleteUserBtn").addEventListener("click", deleteUser);
    document.getElementById("createAppBtn").addEventListener("click", createApp);
    document.getElementById("updateAppBtn").addEventListener("click", updateApp);
    document.getElementById("deleteAppBtn").addEventListener("click", deleteApp);
    document.getElementById("addOrgBtn").addEventListener("click", addOrg);
    document.getElementById("updateOrgBtn").addEventListener("click", updateOrg);
    document.getElementById("deleteOrgBtn").addEventListener("click", deleteOrg);
    document.getElementById("clearConsoleBtn").addEventListener("click", clearConsole);
    document.getElementById("userSearch").addEventListener("input", (e) => { state.userSearch = e.target.value || ""; renderUsers(); });
    document.getElementById("appSearch").addEventListener("input", (e) => { state.appSearch = e.target.value || ""; renderApps(); });

    setAuthVisible(false);
    syncOrgInputs();
    renderConsole();
    if (getToken()) {
      applyScopes(getToken());
      document.getElementById("authStatus").textContent = "Signed in";
      document.getElementById("sessionStatus").textContent = "Signed in";
      handleRefresh().catch((error) => {
        logConsole("Initial refresh failed", String(error));
      });
    }
  </script>
</body>
</html>
